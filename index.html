<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-success: #22c55e;
            --accent-danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            word-break: keep-all;
            padding-bottom: 5rem;
        }

        /* 헤더 디자인: 깊이감 있는 세련된 그라데이션 */
        header {
            background: var(--primary-gradient);
            color: white;
            text-align: center;
            padding: 4rem 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header-container h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .header-container .subtitle {
            font-size: 1.05rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* 메인 레이아웃 구역 */
        .container {
            max-width: 800px;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
        }

        /* 카드 형태 컨테이너 (고급스러운 그림자) */
        .card {
            background: var(--card-bg);
            padding: 2.25rem;
            margin-bottom: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03), 0 8px 15px -6px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.75rem;
        }

        .card-header .icon {
            font-size: 1.6rem;
        }

        .card-header h2 {
            font-size: 1.35rem;
            color: #1e1b4b;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header .en-title {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* 세련된 입력 양식 디자인 */
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        .memory-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }

        .memory-form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 0.5rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            height: 100px;
            resize: none;
        }

        /* 모던 스타일 버튼 */
        button {
            padding: 0.85rem 1.5rem;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #3730a3;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
        }

        /* 삶의 목표 리스트 인테리어 */
        .goal-list {
            list-style: none;
        }

        .goal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border-left: 5px solid #cbd5e1;
            transition: all 0.2s ease;
        }

        .goal-item:hover {
            transform: translateX(3px);
            background: #f1f5f9;
        }

        .goal-item.completed {
            border-left-color: var(--accent-success);
            background: #f0fdf4;
        }

        .goal-item.completed .goal-text {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .goal-item label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            width: 90%;
        }

        .goal-item input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--accent-success);
            cursor: pointer;
        }

        .goal-text {
            font-size: 1rem;
            font-weight: 500;
        }

        .delete-btn {
            background: none;
            color: #94a3b8;
            padding: 0;
            font-size: 1.4rem;
            line-height: 1;
        }

        .delete-btn:hover {
            color: var(--accent-danger);
            background: none;
        }

        /* 행복의 순간 그리드 레이아웃 */
        .memory-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        @media (max-width: 640px) {
            .memory-grid {
                grid-template-columns: 1fr;
            }
        }

        .memory-item {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .memory-item:hover {
            border-color: #4f46e5;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -5px rgba(79, 70, 229, 0.08);
        }

        .memory-main-content {
            margin-bottom: 1rem;
        }

        .memory-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            background: #e0e7ff;
            color: #4f46e5;
            border-radius: 6px;
            margin-bottom: 0.75rem;
        }

        .memory-item h3 {
            font-size: 1.15rem;
            margin-bottom: 0.6rem;
            color: #1e1b4b;
            font-weight: 700;
        }

        .memory-item p {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
        }

        .delete-btn-memory {
            background: none;
            color: #94a3b8;
            font-size: 0.8rem;
            padding: 0;
            align-self: flex-start;
            border-bottom: 1px solid transparent;
            border-radius: 0;
        }

        .delete-btn-memory:hover {
            color: var(--accent-danger);
            background: none;
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            background: white;
            border-top: 1px solid var(--border-color);
            margin-top: 5rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>나의 삶의 기록소</h1>
            <p class="subtitle">목표를 향해 흔들림 없이 나아가고, 눈부신 행복을 기억하는 공간</p>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <div class="card-header">
                <span class="icon">🎯</span>
                <h2>삶의 목표 <span class="en-title">My Goals</span></h2>
            </div>
            
            <div class="input-group">
                <input type="text" id="goalInput" placeholder="새로운 목표를 입력하고 추가를 누르세요...">
                <button onclick="addGoal()">추가</button>
            </div>

            <ul id="goalList" class="goal-list">
                </ul>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="icon">✨</span>
                <h2>행복했던 순간들 <span class="en-title">Happy Memories</span></h2>
            </div>
            
            <div class="memory-form">
                <div class="memory-form-row">
                    <input type="text" id="memoryTitle" placeholder="기억의 제목 (예: 가족과의 소중한 시간)">
                    <input type="text" id="memoryTag" placeholder="태그 (예: 가족)">
                </div>
                <textarea id="memoryContent" placeholder="여기에 소중하고 행복했던 추억을 자유롭게 기록해 보세요..."></textarea>
                <button class="submit-btn" onclick="addMemory()">추억 기록소에 저장</button>
            </div>

            <div id="memoryGrid" class="memory-grid">
                </div>
        </section>
    </main>

    <footer>
        <p>© 2026 My Life Archive. Designed with purpose.</p>
    </footer>

    <script>
        window.onload = function() {
            displayGoals();
            displayMemories();
        };

        /* [ 목표 기능 관리 ] */
        function getGoals() {
            return JSON.parse(localStorage.getItem('myGoals')) || [
                { text: "군 생활 건강하고 보람차게 전역하기", completed: true },
                { text: "전공 분야 깊이 있게 마스터하고 관련 자격증 취득하기", completed: false },
                { text: "체계적인 웨이트 트레이닝을 통한 체력 단련 및 목표 중량 달성", completed: false },
                { text: "꾸준한 어학 학습으로 실전 영어 회화 실력 및 목표 토익 점수 완성", completed: false }
            ];
        }

        function displayGoals() {
            const goals = getGoals();
            const goalList = document.getElementById('goalList');
            goalList.innerHTML = '';
            
            goals.forEach((goal, index) => {
                const li = document.createElement('li');
                li.className = `goal-item ${goal.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <label>
                        <input type="checkbox" ${goal.completed ? 'checked' : ''} onchange="toggleGoal(${index})">
                        <span class="goal-text">${goal.text}</span>
                    </label>
                    <button class="delete-btn" onclick="deleteGoal(${index})">×</button>
                `;
                goalList.appendChild(li);
            });
        }

        function addGoal() {
            const input = document.getElementById('goalInput');
            if (!input.value.trim()) return;
            
            const goals = getGoals();
            goals.push({ text: input.value.trim(), completed: false });
            localStorage.setItem('myGoals', JSON.stringify(goals));
            input.value = '';
            displayGoals();
        }

        function toggleGoal(index) {
            const goals = getGoals();
            goals[index].completed = !goals[index].completed;
            localStorage.setItem('myGoals', JSON.stringify(goals));
            displayGoals();
        }

        function deleteGoal(index) {
            const goals = getGoals();
            goals.splice(index, 1);
            localStorage.setItem('myGoals', JSON.stringify(goals));
            displayGoals();
        }

        /* [ 행복 기억 기능 관리 ] */
        function getMemories() {
            return JSON.parse(localStorage.getItem('myMemories')) || [
                { title: "가족과의 소중한 시간", tag: "가족", content: "어릴 적 할머니께서 주셨던 따뜻한 사랑과 기억들. 언제나 중심을 잡아주는 감사함을 잊지 않고 마음 깊이 간직하기." },
                { title: "성취의 기쁨", tag: "성장", content: "스스로 계획을 세우고 치열하게 노력하여 하나씩 결실을 맺었을 때, 그 순간의 짜릿함과 나 자신에 대한 믿음." }
            ];
        }

        function displayMemories() {
            const memories = getMemories();
            const memoryGrid = document.getElementById('memoryGrid');
            memoryGrid.innerHTML = '';

            memories.forEach((memory, index) => {
                const article = document.createElement('article');
                article.className = 'memory-item';
                article.innerHTML = `
                    <div class="memory-main-content">
                        <div class="memory-badge">${memory.tag}</div>
                        <h3>${memory.title}</h3>
                        <p>${memory.content}</p>
                    </div>
                    <button class="delete-btn-memory" onclick="deleteMemory(${index})">기억 삭제</button>
                `;
                memoryGrid.appendChild(article);
            });
        }

        function addMemory() {
            const title = document.getElementById('memoryTitle');
            const tag = document.getElementById('memoryTag');
            const content = document.getElementById('memoryContent');

            if (!title.value.trim() || !content.value.trim()) {
                alert('제목과 내용을 입력해 주세요!');
                return;
            }

            const memories = getMemories();
            memories.push({
                title: title.value.trim(),
                tag: tag.value.trim() || '일상',
                content: content.value.trim()
            });

            localStorage.setItem('myMemories', JSON.stringify(memories));
            
            title.value = '';
            tag.value = '';
            content.value = '';
            displayMemories();
        }

        function deleteMemory(index) {
            if(confirm('이 행복한 기억을 정말 삭제할까요?')) {
                const memories = getMemories();
                memories.splice(index, 1);
                localStorage.setItem('myMemories', JSON.stringify(memories));
                displayMemories();
            }
        }
    </script>
</body>
</html>
