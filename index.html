<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>나의 삶의 기록소</h1>
            <p class="subtitle">목표를 향해 흔들림 없이 나아가고, 눈부신 행복을 기억하는 공간</p>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <div class="card-header">
                <span class="icon">🎯</span>
                <h2>삶의 목표 <span class="en-title">My Goals</span></h2>
            </div>
            <ul class="goal-list">
                <li class="goal-item completed">
                    <label>
                        <input type="checkbox" checked disabled>
                        <span class="checkbox-custom"></span>
                        <span class="goal-text">군 생활 건강하고 보람차게 전역하기</span>
                    </label>
                </li>
                <li class="goal-item">
                    <label>
                        <input type="checkbox" disabled>
                        <span class="checkbox-custom"></span>
                        <span class="goal-text">전공 분야 깊이 있게 마스터하고 관련 자격증 취득하기</span>
                    </label>
                </li>
                <li class="goal-item">
                    <label>
                        <input type="checkbox" disabled>
                        <span class="checkbox-custom"></span>
                        <span class="goal-text">체계적인 웨이트 트레이닝을 통한 체력 단련 및 목표 중량 달성</span>
                    </label>
                </li>
                <li class="goal-item">
                    <label>
                        <input type="checkbox" disabled>
                        <span class="checkbox-custom"></span>
                        <span class="goal-text">꾸준한 어학 학습으로 실전 영어 회화 실력 및 목표 토익 점수 완성</span>
                    </label>
                </li>
            </ul>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="icon">✨</span>
                <h2>행복했던 순간들 <span class="en-title">Happy Memories</span></h2>
            </div>
            <div class="memory-grid">
                <article class="memory-item">
                    <div class="memory-badge">가족</div>
                    <h3>가족과의 소중한 시간</h3>
                    <p>어릴 적 할머니께서 주셨던 따뜻한 사랑과 기억들. 언제나 중심을 잡아주는 감사함을 잊지 않고 마음 깊이 간직하기.</p>
                </article>
                <article class="memory-item">
                    <div class="memory-badge">성장</div>
                    <h3>성취의 기쁨</h3>
                    <p>스스로 계획을 세우고 치열하게 노력하여 하나씩 결실을 맺었을 때, 그 순간의 짜릿함과 나 자신에 대한 믿음.</p>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 My Life Archive. Designed with purpose.</p>
    </footer>
</body>
</html>
